<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合同会社 きいろのもり</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<style>
  :root{
    --ink:    #3f5a2c;
    --ink-sub:#6f8a52;
    --btn:    #7fae3a;
    --btn-dk: #5c8a24;
    --breeze:    #5ab4d6;
    --breeze-dk: #3a94b6;
    --sun:       #f0ab3d;
    --sun-dk:    #d68e1f;
    --rain:      #4a90d9;
    --rain-dk:   #2c6db5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }

  body {
    overflow: hidden;
    font-family: 'Hiragino Maru Gothic ProN', 'Kosugi Maru', sans-serif;
    background: #eef3e4;
  }

  /* ===== 背景 ===== */
  #bg {
    position: fixed;
    inset: 0;
    background: url('background.png') center center / cover no-repeat;
    z-index: 0;
    /* 後ろに退かせる：少し明るく・ほんのりぼかす（scaleは縁のにじみ防止） */
    filter: saturate(0.96) brightness(1.10) blur(2.5px);
    transform: scale(1.05);
    transition: filter 1.5s ease, transform 1.5s ease;
  }
  #bg[data-stars='1'] {
    transform: scale(1.0);
  }
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(255,255,255,0.46), rgba(255,255,255,0.46)),
      radial-gradient(120% 90% at 50% 45%,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.00) 70%);
  }

  /* ===== ステージ ===== */
  #stage { position: fixed; inset: 0; z-index: 10; }

  /* ===== ロゴ ===== */
  #logo-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }
  /* 白い光は廃止。ロゴ自体の影で視認性を確保（下の img filter 参照） */
  #logo-wrap img {
    display: block;
    margin: 0 auto;
    width: 260px;
    height: auto;
  }
  .tagline{
    margin-top: 18px;
    color: var(--ink);
    font-size: 15px;
    letter-spacing: 0.22em;
    text-indent: 0.22em;
    text-shadow: 0 1px 2px rgba(255,255,255,0.85);
  }

  /* ===== 下部UI ===== */
  #notice{
    position: fixed;
    left: 50%; bottom: 96px;
    transform: translateX(-50%);
    z-index: 25;
    text-align: center;
    color: var(--ink-sub);
    text-shadow: 0 1px 2px rgba(255,255,255,0.85);
    pointer-events:none;
  }
  #notice .lead{ font-size:13px; letter-spacing:0.42em; text-indent:0.42em; opacity:0.9; }
  #notice .line{ margin:12px auto 0; width:34px; height:1px; background:var(--ink-sub); opacity:0.5; }
  #notice .sub{ margin-top:10px; font-size:12px; letter-spacing:0.18em; }

  #btn-group{
    position: fixed;
    left: 50%; bottom: 34px;
    transform: translateX(-50%);
    z-index: 30;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #btn-group button{
    border: none;
    cursor: pointer;
    padding: 13px 0;
    width: 120px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 0.14em;
    color: #fff;
    transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
  }
  #dance-btn{
    background: var(--btn);
    box-shadow: 0 6px 16px rgba(92,138,36,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  #dance-btn:hover{ background: var(--btn-dk); box-shadow: 0 8px 20px rgba(92,138,36,0.45), inset 0 1px 0 rgba(255,255,255,0.35); }
  #dance-btn:active{ transform: scale(0.96); }
  #dance-btn.on{ background: var(--btn-dk); }
  #breeze-btn{
    background: var(--breeze);
    box-shadow: 0 6px 16px rgba(58,148,182,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  #breeze-btn:hover{ background: var(--breeze-dk); box-shadow: 0 8px 20px rgba(58,148,182,0.45), inset 0 1px 0 rgba(255,255,255,0.35); }
  #breeze-btn:active{ transform: scale(0.96); }
  #breeze-btn:disabled{ opacity: 0.55; cursor: default; transform: none; }
  #photo-btn{
    background: var(--sun);
    box-shadow: 0 6px 16px rgba(230,160,30,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  #photo-btn:hover{ background: var(--sun-dk); box-shadow: 0 8px 20px rgba(230,160,30,0.45), inset 0 1px 0 rgba(255,255,255,0.35); }
  #photo-btn:active{ transform: scale(0.96); }
  #photo-btn.on{ background: var(--sun-dk); }

  /* ===== 神秘的な消滅：葉っぱ・花びらが舞い、シャボン玉のように透けて消える ===== */
  /* 舞い散る葉っぱ・花びら */
  @keyframes petal-drift{
    0%   { transform: translate(0,0) rotate(0deg) scale(0.5); opacity:0; }
    15%  { opacity:1; }
    100% { transform: translate(var(--px), var(--py)) rotate(var(--pr)) scale(1); opacity:0; }
  }
  .petal{
    position: fixed;
    z-index: 65;
    pointer-events: none;
    will-change: transform, opacity;
    animation: petal-drift var(--pd) ease-out forwards;
  }
  /* きらめき */
  @keyframes sparkle-twinkle{
    0%   { transform: translate(-50%,-50%) scale(0)   rotate(0deg);   opacity:0; }
    40%  { transform: translate(-50%,-50%) scale(1.2) rotate(40deg);  opacity:1; }
    100% { transform: translate(-50%,-50%) scale(0.2) rotate(90deg);  opacity:0; }
  }
  .sparkle{
    position: fixed;
    z-index: 66;
    font-size: 22px;
    pointer-events: none;
    will-change: transform, opacity;
    animation: sparkle-twinkle var(--sd) ease-in-out forwards;
  }

  /* ===== 風ライン ===== */
  @keyframes wind-streak {
    0%   { transform: translateX(-120%); opacity: 0; }
    8%   { opacity: 1; }
    88%  { opacity: 0.7; }
    100% { transform: translateX(110vw); opacity: 0; }
  }
  .wind-line {
    position: fixed;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(190,230,255,0.9), rgba(255,255,255,1), rgba(190,230,255,0.7), transparent);
    border-radius: 999px;
    pointer-events: none;
    z-index: 50;
    animation: wind-streak linear forwards;
  }

  /* ===== breezeアニメ（bobレイヤーに適用）：くるりと回転しながら斜め上へ宙返り ===== */
  @keyframes char-breeze {
    0%   { transform: translate(0,0)              rotate(0deg);   opacity:1; }
    6%   { transform: translate(18px,-8px)        rotate(35deg);  opacity:1; }
    45%  { transform: translate(125vw,-55vh)      rotate(540deg); opacity:1; }
    46%  { transform: translate(125vw,-55vh)      rotate(540deg); opacity:0; }
    /* 飛んでいったら、元の位置でそのままフェードインして戻る */
    47%  { transform: translate(0,0)              rotate(0deg);   opacity:0; }
    68%  { transform: translate(0,0)              rotate(0deg);   opacity:0; }
    100% { transform: translate(0,0)              rotate(0deg);   opacity:1; }
  }

  /* ===== 風を吹く雲（左から登場） ===== */
  #wind-blower{
    position: fixed;
    left: 0; top: 50%;
    width: 440px; height: auto;
    z-index: 60;
    transform: translate(-130%, -50%);
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 6px 14px rgba(60,90,120,0.20));
  }
  #wind-blower.blow{ animation: blower-in 4200ms ease-in-out forwards; }
  @keyframes blower-in{
    0%   { transform: translate(-130%, -50%) rotate(-4deg); opacity:0; }
    14%  { transform: translate(-4%,  -50%) rotate(0deg);  opacity:1; }
    /* 息を吹く（プルッと力む） */
    22%  { transform: translate(2%,   -50%) scale(1.03); opacity:1; }
    30%  { transform: translate(-1%,  -50%) scale(0.99); opacity:1; }
    40%  { transform: translate(1%,   -50%) scale(1.02); opacity:1; }
    50%  { transform: translate(0%,   -50%) scale(1);    opacity:1; }
    74%  { transform: translate(0%,   -50%) rotate(0deg); opacity:1; }
    100% { transform: translate(-130%, -50%) rotate(-4deg); opacity:0; }
  }

  /* ===== 舞う葉っぱ ===== */
  @keyframes leaf-fly{
    0%   { transform: translate(0,0) rotate(0deg);   opacity:0; }
    8%   { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translate(var(--lx), var(--ly)) rotate(var(--lr)); opacity:0; }
  }
  .leaf{
    position: fixed;
    z-index: 55;
    pointer-events: none;
    will-change: transform, opacity;
    animation: leaf-fly linear forwards;
  }

  /* ========== キャラ共通 ========== */
  .char-orbit { position: absolute; z-index: 15; }
  .char-bob   { width:100%; height:100%; }            /* ふわふわ上下 */
  .char-flip  { width:100%; height:100%; transition: transform .25s ease; }  /* 向き */
  .char-body-wrap { display:flex; flex-direction:column; align-items:center; } /* 揺れ */

  .c-body { background-repeat:no-repeat; background-size:var(--bw) var(--bh); }
  .c-legs { background-repeat:no-repeat; background-size:var(--bw) var(--lh); transform-origin:center top; }

  /* ===== 軌道 ===== */
  @keyframes orbit { from{offset-distance:0%} to{offset-distance:100%} }

  /* ===== ふわふわ浮遊 ===== */
  @keyframes float-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }

  /* ===== 体（上品な小さい揺れ） ===== */
  @keyframes body-walk  { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-5px) rotate(1.5deg)} }
  @keyframes body-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.10)} }
  @keyframes body-flap  { 0%,100%{transform:rotate(-9deg) translateY(-2px)} 50%{transform:rotate(9deg) translateY(-2px)} }
  @keyframes body-sway  { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
  @keyframes body-fairy {
    0%{transform:translateY(0) rotate(-2deg)}
    35%{transform:translateY(-9px) rotate(2deg) scale(1.04)}
    70%{transform:translateY(-4px) rotate(-1deg)}
    100%{transform:translateY(0) rotate(-2deg)}
  }
  @keyframes body-bounce {
    0%,100%{transform:translateY(0) scaleY(1)}
    40%{transform:translateY(-9px) scaleY(1.03)}
    70%{transform:translateY(0) scaleY(0.94)}
    85%{transform:translateY(-3px) scaleY(1.01)}
  }
  @keyframes body-spin {
    0%,45%{transform:scaleX(1)}
    50%,95%{transform:scaleX(-1)}
    100%{transform:scaleX(1)}
  }
  @keyframes fairy-full {
    0%{transform:rotate(0deg) translateX(0)}
    10%{transform:rotate(0deg) translateX(-4px)}
    20%{transform:rotate(0deg) translateX(4px)}
    30%{transform:rotate(0deg) translateX(-4px)}
    40%{transform:rotate(0deg) translateX(0)}
    50%{transform:rotate(360deg) translateX(0)}
    60%{transform:rotate(360deg) translateX(-4px)}
    70%{transform:rotate(360deg) translateX(4px)}
    80%{transform:rotate(360deg) translateX(-4px)}
    90%{transform:rotate(360deg) translateX(0)}
    100%{transform:rotate(720deg) translateX(0)}
  }

  /* ===== 足 ===== */
  @keyframes legs-walk  { 0%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} 100%{transform:rotate(-10deg)} }
  @keyframes legs-fairy { 0%,100%{transform:rotate(0deg) scaleY(1)} 25%{transform:rotate(-8deg) scaleY(0.95)} 75%{transform:rotate(8deg) scaleY(0.95)} }
  @keyframes legs-still { 0%,100%{transform:rotate(0deg)} }
  @keyframes legs-bounce{ 0%,100%{transform:scaleY(1)} 40%{transform:scaleY(0.85) rotate(3deg)} 60%{transform:scaleY(1.08)} }

  @media (prefers-reduced-motion: reduce){
    .char-bob, .char-body-wrap, .c-legs { animation: none !important; }
  }

  /* ===== キャラ名ポップアップ ===== */
  #char-popup {
    position: fixed;
    z-index: 80;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px) scale(0.95);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #char-popup.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  #char-popup-inner {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(127,174,58,0.35);
    border-radius: 18px;
    padding: 18px 22px 16px;
    box-shadow: 0 8px 32px rgba(60,90,30,0.18), 0 2px 8px rgba(60,90,30,0.10);
    max-width: 280px;
    min-width: 180px;
    position: relative;
  }
  #char-popup-name {
    font-size: 22px;
    font-weight: bold;
    color: var(--ink);
    letter-spacing: 0.18em;
    text-align: center;
    margin-bottom: 10px;
  }
  #char-popup-desc {
    font-size: 12px;
    color: var(--ink-sub);
    line-height: 1.8;
    letter-spacing: 0.08em;
    text-align: left;
  }
  #char-popup-close {
    position: absolute;
    top: 8px; right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-sub);
    line-height: 1;
    padding: 2px 4px;
    border-radius: 50%;
    transition: background 0.15s;
  }
  #char-popup-close:hover { background: rgba(0,0,0,0.08); }
  .char-clickable { cursor: pointer; }
  .char-clickable:hover .char-bob {
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  .char-clickable .char-flip {
    transition: transform 0.15s ease;
    transform-origin: center bottom;
  }
  .char-clickable:hover .char-flip {
    transform: scale(1.08);
  }
  @keyframes char-punyu {
    0%   { transform: scale(1); }
    15%  { transform: scale(0.82, 1.18); }
    30%  { transform: scale(1.15, 0.88); }
    50%  { transform: scale(0.92, 1.08); }
    70%  { transform: scale(1.06, 0.96); }
    85%  { transform: scale(0.97, 1.02); }
    100% { transform: scale(1); }
  }
  .char-flip.char-punyu {
    animation: char-punyu 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) !important;
    transform-origin: center bottom;
  }

  /* ===== 恵の雨ボタン ===== */
  #rain-btn{
    background: var(--rain);
    box-shadow: 0 6px 16px rgba(44,109,181,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  #rain-btn:hover{ background: var(--rain-dk); box-shadow: 0 8px 20px rgba(44,109,181,0.45), inset 0 1px 0 rgba(255,255,255,0.35); }
  #rain-btn:active{ transform: scale(0.96); }
  #rain-btn:disabled{ opacity: 0.55; cursor: default; transform: none; }

  /* ===== 星空ボタン ===== */
  #stars-btn{
    background: #1a2a4a;
    box-shadow: 0 6px 16px rgba(26,42,74,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  #stars-btn:hover{ background: #253a63; box-shadow: 0 8px 20px rgba(26,42,74,0.55), inset 0 1px 0 rgba(255,255,255,0.2); }
  #stars-btn:active{ transform: scale(0.96); }
  #stars-btn:disabled{ opacity: 0.55; cursor: default; transform: none; }

  /* ===== 流れ星 ===== */
  .shooting-star {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 69;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px 2px rgba(255,255,220,0.9), 0 0 12px 4px rgba(200,220,255,0.5);
  }
  .shooting-star::after {
    content: '';
    position: absolute;
    top: 50%;
    right: 2px;
    transform: translateY(-50%);
    width: 80px;
    height: 1.5px;
    background: linear-gradient(to left, rgba(255,255,220,0.9), transparent);
  }

  /* ===== JUMPボタン ===== */
  #jump-btn {
    background: #e8724a;
    box-shadow: 0 6px 16px rgba(232,114,74,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  #jump-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 22px rgba(232,114,74,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  @keyframes jump-punyu {
    0%   { transform: scale(1); }
    15%  { transform: scale(0.82, 1.18); }   /* 横に潰れる */
    30%  { transform: scale(1.15, 0.88); }   /* 縦に伸びて跳ぶ */
    50%  { transform: scale(0.92, 1.08); }   /* 着地で潰れる */
    70%  { transform: scale(1.06, 0.96); }   /* 小さく跳ね返る */
    85%  { transform: scale(0.97, 1.02); }
    100% { transform: scale(1); }
  }
  #jump-btn.punyu {
    animation: jump-punyu 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }

  /* ===== 恵みの雨キャラクター ===== */
  #rain-character {
    position: fixed;
    z-index: 70;
    pointer-events: none;
    width: 220px;
    height: auto;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(-110%);
    filter: drop-shadow(0 6px 18px rgba(44,109,181,0.35));
    transition: none;
  }
  #rain-character.rain-enter {
    animation: rain-char-enter 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  #rain-character.rain-exit {
    animation: rain-char-exit 0.8s ease-in forwards;
  }
  @keyframes rain-char-enter {
    0%   { transform: translateX(-50%) translateY(-110%); }
    100% { transform: translateX(-50%) translateY(10px); }
  }
  @keyframes rain-char-exit {
    0%   { transform: translateX(-50%) translateY(10px); }
    100% { transform: translateX(-50%) translateY(-110%); }
  }

  /* ===== 雨粒 ===== */
  @keyframes rain-fall {
    0%   { transform: translateY(-120px) rotate(var(--rr)); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.85; }
    100% { transform: translateY(calc(100vh + 120px)) rotate(var(--rr)); opacity: 0; }
  }
  .rain-drop {
    position: fixed;
    z-index: 68;
    pointer-events: none;
    will-change: transform, opacity;
    animation: rain-fall var(--rd) linear var(--rdelay) infinite;
  }
</style>
</head>
<body>

<div id="bg"></div>

<div id="stage">
  <div id="logo-wrap">
    <img src="logo.png" alt="合同会社 きいろのもり">
  </div>
</div>


<img id="wind-blower" src="char_wind.png" alt="">
<img id="rain-character" src="rain_char.png" alt="恵みの雨">

<div id="char-popup">
  <div id="char-popup-inner">
    <button id="char-popup-close" type="button">✕</button>
    <div id="char-popup-name"></div>
    <div id="char-popup-desc"></div>
  </div>
</div>

<div id="btn-group">
  <button id="dance-btn" type="button">dance ♪</button>
  <button id="breeze-btn" type="button">breeze 🌬</button>
  <button id="photo-btn" type="button">光合成 ☀️</button>
  <button id="rain-btn" type="button">恵の雨 ☔️</button>
  <button id="stars-btn" type="button">星空 ✨</button>
  <button id="jump-btn" type="button">JUMP 🐾</button>
</div>

<script>
// ===== 表示サイズ =====
const DISP_W  = 190;
const SCALE   = DISP_W / 938;
const DISP_BH = Math.round(476 * SCALE);
const DISP_LH = Math.round(292 * SCALE);
const FULL_H  = DISP_W;  // 新しい画像は 2000×2000 の正方形

const ORBIT_DUR = 40;   // 回転モードの一周（秒）

// キャラ定義
const CHARS = [
  { name:'fruit', bodyAnim:'body-flap',   legAnim:'legs-still',  bodyDur:0.85, legDur:1.00, phase:0/6, full:true },
  { name:'sun',   bodyAnim:'body-pulse',  legAnim:'legs-still',  bodyDur:2.00, legDur:1.00, phase:1/6, full:true },
  { name:'stump', bodyAnim:'body-bounce', legAnim:'legs-bounce', bodyDur:1.80, legDur:1.80, phase:2/6, full:true },
  { name:'leaf',  bodyAnim:'body-sway',   legAnim:'legs-still',  bodyDur:3.20, legDur:1.00, phase:3/6, full:true },
  { name:'fairy', bodyAnim:'body-fairy',  legAnim:'legs-fairy',  bodyDur:4.20, legDur:2.10, phase:4/6, full:true,
    label:'ティラス',
    desc:'パワースポットの聖なるエネルギーが滴り落ちた「光の雫」から生まれた妖精。\n自然が編み上げた「光のティアラ」を頭に戴き、ノッティや仲間たちの行く先を温かく照らします。\n頭の勾玉には特別な秘密が隠されているとか…✨'
  },
  { name:'trees', bodyAnim:'body-spin',   legAnim:'legs-still',  bodyDur:5.00, legDur:1.00, phase:5/6, full:true },
];

const stage     = document.getElementById('stage');
const btn       = document.getElementById('dance-btn');
const breezeBtn = document.getElementById('breeze-btn');

let dancing = false;
let items = [];   // {orbit, flip, phase}

// 現在の周回位置(％)を取得（取れなければ phase を使う）
function currentPct(el, fallback){
  try{
    const d = getComputedStyle(el).offsetDistance;
    if(d && d.endsWith('%')) return parseFloat(d);
  }catch(e){}
  return fallback;
}

function applyMode(){
  btn.textContent = dancing ? 'stop ■' : 'dance ♪';
  btn.classList.toggle('on', dancing);

  items.forEach(it=>{
    const pct = currentPct(it.orbit, it.phase * 100);
    if(dancing){
      // 今の位置から滑らかに周回開始（負の遅延で位相合わせ）
      const delay = (pct / 100) * ORBIT_DUR;
      it.orbit.style.animation = `orbit ${ORBIT_DUR}s linear -${delay.toFixed(2)}s infinite`;
    }else{
      // 今の位置で停止（その場でふわふわ）
      it.orbit.style.animation = 'none';
      it.orbit.style.offsetDistance = pct.toFixed(2) + '%';
      it.flip.style.transform = 'scaleX(1)';
    }
  });
}

function build() {
  items.forEach(it => it.orbit.remove());
  items = [];

  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const rx = Math.min(window.innerWidth  * 0.32, 320);
  const ry = Math.min(window.innerHeight * 0.28, 230);
  const totalH = DISP_BH + DISP_LH;

  CHARS.forEach((c, i) => {
    const charH = c.full ? FULL_H : totalH;

    // 軌道ラッパー（停止中は phase 位置に駐機）
    const orbit = document.createElement('div');
    orbit.className = 'char-orbit';
    orbit.style.cssText = `
      width:${DISP_W}px; height:${charH}px;
      left:${cx - DISP_W/2}px; top:${cy - charH/2}px;
      offset-path: ellipse(${rx}px ${ry}px at 50% 50%);
      offset-rotate: 0deg;
      offset-distance: ${(c.phase*100).toFixed(2)}%;
    `;

    // ふわふわ浮遊レイヤー（常時・キャラごとに少しずらす）
    const bob = document.createElement('div');
    bob.className = 'char-bob';
    const bobAnim = `float-bob ${(3.4 + i*0.4).toFixed(1)}s ease-in-out ${(i*0.5).toFixed(1)}s infinite`;
    bob.style.animation = bobAnim;

    // 向きレイヤー
    const flip = document.createElement('div');
    flip.className = 'char-flip';

    // 揺れレイヤー
    const bodyWrap = document.createElement('div');
    bodyWrap.className = 'char-body-wrap';

    if (c.full) {
      const anim = c.name === 'fairy' ? 'fairy-full' : c.bodyAnim;
      const dur  = c.name === 'fairy' ? ORBIT_DUR / 2 : c.bodyDur;
      bodyWrap.style.animation = `${anim} ${dur}s ease-in-out 0s infinite`;

      const full = document.createElement('div');
      full.style.cssText = `
        width:${DISP_W}px; height:${FULL_H}px;
        background-image:url('char_${c.name}.png');
        background-size:${DISP_W}px ${FULL_H}px;
        background-repeat:no-repeat; transform-origin:center center;
      `;
      bodyWrap.appendChild(full);

    } else {
      bodyWrap.style.animation = `${c.bodyAnim} ${c.bodyDur}s ease-in-out 0s infinite`;

      const body = document.createElement('div');
      body.className = 'c-body';
      body.style.cssText = `
        width:${DISP_W}px; height:${DISP_BH}px;
        background-image:url('char_${c.name}_body.png');
        background-size:${DISP_W}px ${DISP_BH}px; background-repeat:no-repeat;
      `;
      const legs = document.createElement('div');
      legs.className = 'c-legs';
      legs.style.cssText = `
        width:${DISP_W}px; height:${DISP_LH}px;
        background-image:url('char_${c.name}_legs.png');
        background-size:${DISP_W}px ${DISP_LH}px; background-repeat:no-repeat;
        animation:${c.legAnim} ${c.legDur}s ease-in-out 0s infinite;
        transform-origin:center top;
      `;
      bodyWrap.appendChild(body);
      bodyWrap.appendChild(legs);
    }

    flip.appendChild(bodyWrap);
    bob.appendChild(flip);
    orbit.appendChild(bob);
    stage.appendChild(orbit);

    items.push({ orbit, flip, bob, bobAnim, phase: c.phase });

    // ぷにゅアニメ（全キャラ共通）
    orbit.classList.add('char-clickable');
    orbit.addEventListener('click', (e) => {
      e.stopPropagation();
      flip.classList.remove('char-punyu');
      void flip.offsetWidth;
      flip.classList.add('char-punyu');
      // ラベルがあるキャラはポップアップも表示
      if (c.label) showCharPopup(c, orbit);
    });
    flip.addEventListener('animationend', () => {
      flip.classList.remove('char-punyu');
    });

    // 進行方向で左右反転（dance中のみ作動）
    (function loop() {
      if (dancing) {
        const rect = orbit.getBoundingClientRect();
        const charCx = rect.left + rect.width / 2;
        flip.style.transform = (charCx < cx) ? 'scaleX(-1)' : 'scaleX(1)';
      }
      requestAnimationFrame(loop);
    })();
  });

  applyMode();
}

btn.addEventListener('click', () => {
  dancing = !dancing;
  applyMode();
});

// ===== breeze =====
let breezing = false;
const windBlower = document.getElementById('wind-blower');

// 雲が登場してから他のキャラを吹き飛ばすまでの間（ms）
const BLOW_DELAY  = 750;
const BREEZE_DUR  = 5200;   // 0→45%（飛び去る部分）が約2.3秒＝葉っぱと同じ速さ
const LEAF_IMGS = ['leaf_1.png','leaf_2.png','leaf_3.png','leaf_4.png','leaf_5.png','leaf_6.png','leaf_7.png'];

// 葉っぱを1枚、雲の口元あたりから右へ舞わせる
function spawnLeaf(){
  const leaf = document.createElement('img');
  leaf.src = LEAF_IMGS[Math.floor(Math.random()*LEAF_IMGS.length)];
  leaf.className = 'leaf';

  // 出発点：画面左寄り（雲の口元付近）の高さ
  const startX = 90 + Math.random()*180;
  const startY = window.innerHeight*0.45 + (Math.random()-0.5)*180;
  // 終着：右へ流れつつ、やや上下に散る
  const lx = (window.innerWidth - startX + 80) + 'px';
  const ly = (-120 + (Math.random()-0.5)*260) + 'px';
  const lr = (360 + Math.random()*540) * (Math.random()<0.5?-1:1) + 'deg';
  const dur = 1.6 + Math.random()*1.4;
  const delay = Math.random()*0.9;
  const size = Math.round(28 + Math.random()*24);

  leaf.style.cssText =
    `left:${startX}px; top:${startY}px; width:${size}px; height:auto;` +
    `--lx:${lx}; --ly:${ly}; --lr:${lr};` +
    `animation-duration:${dur}s; animation-delay:${delay}s;`;
  document.body.appendChild(leaf);
  setTimeout(() => leaf.remove(), (delay + dur + 0.2) * 1000);
}

breezeBtn.addEventListener('click', () => {
  if (breezing) return;
  breezing = true;
  breezeBtn.disabled = true;

  // ① 雲が左から登場して息を吹く
  windBlower.classList.remove('blow');
  void windBlower.offsetWidth;   // アニメ再生のリセット
  windBlower.classList.add('blow');

  // ② 風ライン生成（雲が吹き始める頃に合わせて少し遅らせる）
  const lineCount = 16;
  for (let i = 0; i < lineCount; i++) {
    const line = document.createElement('div');
    line.className = 'wind-line';
    const w     = 60 + Math.random() * 220;
    const top   = Math.random() * window.innerHeight;
    const delay = (BLOW_DELAY/1000) + Math.random() * 0.7;
    const dur   = 0.5 + Math.random() * 0.6;
    line.style.cssText = `width:${w}px; top:${top}px; left:0; animation-duration:${dur}s; animation-delay:${delay}s;`;
    document.body.appendChild(line);
    setTimeout(() => line.remove(), (delay + dur + 0.15) * 1000);
  }

  // ③ 葉っぱを舞わせる（雲が吹くタイミングで）
  setTimeout(() => {
    for (let i = 0; i < 14; i++) spawnLeaf();
  }, BLOW_DELAY);

  // ④ 雲が吹いた後、キャラたちをくるりと宙返りさせて飛ばす
  setTimeout(() => {
    items.forEach((it, i) => {
      const stagger = i * 70;
      setTimeout(() => {
        it.bob.style.animation = `char-breeze ${BREEZE_DUR}ms linear forwards`;
      }, stagger);
      // 終了後に元のふわふわアニメに戻す
      setTimeout(() => {
        it.bob.style.animation = it.bobAnim;
      }, stagger + BREEZE_DUR);
    });
  }, BLOW_DELAY);

  // ⑤ 全員戻ったらボタン解除
  setTimeout(() => {
    breezing = false;
    breezeBtn.disabled = false;
  }, BLOW_DELAY + BREEZE_DUR + items.length * 70 + 100);
});

// ===== 光合成（どんどん大きく → もう一度押すと戻る / 放置で破裂） =====
const photoBtn  = document.getElementById('photo-btn');
let   photoOn   = false;
let   photoTimer= null;
let   sunOrbitRAF = null;
const GROW_TIME = 5000;   // 大きくなりきって破裂するまで(ms)
const MAX_SCALE = 3;      // 最大の大きさ
const SUN_ORBIT_MS = 2400; // 太陽が一周する時間(ms)

function setCharScale(scale, dur, ease){
  items.forEach(it=>{
    it.orbit.style.transformOrigin = 'center center';
    it.orbit.style.transition = `transform ${dur}ms ${ease}`;
    it.orbit.style.transform  = `scale(${scale})`;
  });
}

const PETALS   = ['🍃','🌸','🌿','🍂','🌺'];
const SPARKLES = ['✨','🌟','⭐️','💫'];

// 葉っぱ・花びらを1枚、中心(cx,cy)から舞い散らせる
function spawnPetal(cx, cy){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = PETALS[Math.floor(Math.random()*PETALS.length)];
  const px = ((Math.random()-0.5) * 360) + 'px';            // 横に広がる
  const py = (60 + Math.random()*220) + 'px';               // ふわっと下へ
  const pr = ((Math.random()<0.5?-1:1) * (180+Math.random()*360)) + 'deg';
  const pd = (1.8 + Math.random()*1.6) + 's';               // ゆっくり
  p.style.cssText =
    `left:${cx}px; top:${cy}px; font-size:${20+Math.random()*20}px;` +
    `--px:${px}; --py:${py}; --pr:${pr}; --pd:${pd};`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 3600);
}

// きらめきを1つ
function spawnSparkle(cx, cy){
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = SPARKLES[Math.floor(Math.random()*SPARKLES.length)];
  const ox = cx + (Math.random()-0.5)*120;
  const oy = cy + (Math.random()-0.5)*120;
  s.style.cssText = `left:${ox}px; top:${oy}px; font-size:${16+Math.random()*16}px; --sd:${(0.8+Math.random()*0.9)}s;`;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1900);
}

// 神秘的に消える：シャボン玉のように透けて消えつつ、葉・花びら・きらめきが舞う
function photoBurst(){
  items.forEach(it=>{
    const r  = it.orbit.getBoundingClientRect();
    const cx = r.left + r.width/2;
    const cy = r.top  + r.height/2;
    // シャボン玉のように、ふわっと膨らんで光りながら透けて消える
    it.orbit.style.transition = 'transform 800ms ease-out, opacity 800ms ease-out, filter 800ms ease-out';
    it.orbit.style.transform  = `scale(${MAX_SCALE * 1.12})`;
    it.orbit.style.opacity     = '0';
    it.orbit.style.filter      = 'blur(4px) brightness(1.5)';
    // 葉っぱ・花びら・きらめきを舞わせる
    for (let i=0;i<10;i++) spawnPetal(cx, cy);
    for (let i=0;i<8; i++) spawnSparkle(cx, cy);
  });
  // 消えたあと、元の画面（通常サイズ）へそっと戻す（舞い散る葉はそのまま余韻を残す）
  setTimeout(() => {
    photoOn = false;
    photoBtn.classList.remove('on');
    build();
  }, 850);
}

// 太陽キャラクターがキャラ全体を一周するアニメーション
function runSunOrbit(callback) {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const rx = Math.min(window.innerWidth  * 0.32, 320) + 90;
  const ry = Math.min(window.innerHeight * 0.28, 230) + 70;
  const sunSize = DISP_W;

  const sunEl = document.createElement('div');
  sunEl.style.cssText = `
    position:fixed; z-index:75; pointer-events:none;
    width:${sunSize}px; height:${sunSize}px;
    background-image:url('char_sun.png');
    background-size:${sunSize}px ${sunSize}px;
    background-repeat:no-repeat;
    filter:drop-shadow(0 0 18px rgba(240,171,61,0.85));
    transition:transform 0.1s;
  `;
  document.body.appendChild(sunEl);

  const start = performance.now();

  function tick(now) {
    const elapsed = now - start;
    const progress = elapsed / SUN_ORBIT_MS;

    if (progress >= 1) {
      sunEl.remove();
      sunOrbitRAF = null;
      callback();
      return;
    }

    // 上（-π/2）から時計回りで一周
    const angle = progress * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(angle) * rx - sunSize / 2;
    const y = cy + Math.sin(angle) * ry - sunSize / 2;
    sunEl.style.left = x + 'px';
    sunEl.style.top  = y + 'px';

    // 左半分では反転、右半分では正向き
    const facingLeft = Math.cos(angle) < 0;
    sunEl.style.transform = facingLeft ? 'scaleX(-1)' : 'scaleX(1)';

    sunOrbitRAF = requestAnimationFrame(tick);
  }

  sunOrbitRAF = requestAnimationFrame(tick);
  return sunEl;
}

photoBtn.addEventListener('click', () => {
  if (!photoOn){
    photoOn = true;
    photoBtn.classList.add('on');

    // ① 太陽が一周してから大きくなる
    runSunOrbit(() => {
      if (!photoOn) return; // 一周中にキャンセルされた場合
      setCharScale(MAX_SCALE, GROW_TIME, 'linear');
      photoTimer = setTimeout(photoBurst, GROW_TIME);
    });
  } else {
    // もう一度押したら通常サイズに戻す
    clearTimeout(photoTimer);
    if (sunOrbitRAF) {
      cancelAnimationFrame(sunOrbitRAF);
      sunOrbitRAF = null;
      // 軌道中の太陽要素を削除
      document.querySelectorAll('div[style*="char_sun.png"]').forEach(el => {
        if (el.style.position === 'fixed' && el.style.zIndex === '75') el.remove();
      });
    }
    photoOn = false;
    photoBtn.classList.remove('on');
    setCharScale(1, 700, 'ease');
  }
});

// ===== キャラ名ポップアップ =====
const popup      = document.getElementById('char-popup');
const popupName  = document.getElementById('char-popup-name');
const popupDesc  = document.getElementById('char-popup-desc');
const popupClose = document.getElementById('char-popup-close');

function showCharPopup(charDef, orbitEl) {
  const rect = orbitEl.getBoundingClientRect();
  popupName.textContent = charDef.label;
  popupDesc.innerHTML = charDef.desc.replace(/\n/g, '<br>');

  // ポップアップの位置：キャラの上に表示、画面端を考慮
  popup.style.left = '0';
  popup.style.top  = '0';
  popup.classList.add('visible');

  const pw = popup.offsetWidth;
  const ph = popup.offsetHeight;
  let x = rect.left + rect.width / 2 - pw / 2;
  let y = rect.top - ph - 12;

  // 画面下に収まらない場合はキャラの下に出す
  if (y < 8) y = rect.bottom + 12;
  // 画面端のはみ出し補正
  x = Math.max(8, Math.min(x, window.innerWidth - pw - 8));
  y = Math.max(8, Math.min(y, window.innerHeight - ph - 8));

  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

function hideCharPopup() {
  popup.classList.remove('visible');
}

popupClose.addEventListener('click', (e) => { e.stopPropagation(); hideCharPopup(); });
document.addEventListener('click', hideCharPopup);
popup.addEventListener('click', (e) => e.stopPropagation());

build();

// ===== 恵の雨 =====
const rainBtn  = document.getElementById('rain-btn');
const rainChar = document.getElementById('rain-character');
const RAIN_IMGS = [
  'raindrop_1.png','raindrop_2.png','raindrop_3.png','raindrop_4.png',
  'raindrop_5.png','raindrop_6.png','raindrop_7.png','raindrop_8.png',
  'raindrop_9.png','raindrop_10.png','raindrop_11.png'
];
let raining = false;
let rainInterval = null;
let drops = [];

function startRain() {
  raining = true;
  rainBtn.textContent = '恵の雨 ☔️ ON';

  rainChar.classList.remove('rain-exit');
  void rainChar.offsetWidth;
  rainChar.classList.add('rain-enter');

  const vh = window.innerHeight;
  for (let i = 0; i < 35; i++) {
    drops.push(createDrop(Math.random() * vh));
  }
  scheduleSpawn();
  requestAnimationFrame(tickRain);
}

function scheduleSpawn() {
  if (!raining) return;
  drops.push(createDrop(-40));
  rainInterval = setTimeout(scheduleSpawn, 100 + Math.random() * 200);
}

function createDrop(startY) {
  const img = document.createElement('img');
  img.src = RAIN_IMGS[Math.floor(Math.random() * RAIN_IMGS.length)];
  img.className = 'rain-drop';
  const size = 10 + Math.random() * 10;
  img.style.cssText = `width:${size}px; height:auto; position:fixed; pointer-events:none; z-index:68; opacity:0.88;`;
  document.body.appendChild(img);
  return {
    el: img,
    x: Math.random() * (window.innerWidth - size),
    y: startY,
    speed: 2.5 + Math.random() * 3.5,
    rot: (Math.random() - 0.5) * 20,
  };
}

function tickRain() {
  const vh = window.innerHeight;
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.y += d.speed;
    d.el.style.left = d.x + 'px';
    d.el.style.top  = d.y + 'px';
    d.el.style.transform = `rotate(${d.rot}deg)`;
    if (d.y > vh + 60) {
      d.el.remove();
      drops.splice(i, 1);
    }
  }
  if (raining || drops.length > 0) requestAnimationFrame(tickRain);
}

function stopRain() {
  raining = false;
  clearTimeout(rainInterval);
  rainInterval = null;
  rainBtn.textContent = '恵の雨 ☔️';

  rainChar.classList.remove('rain-enter');
  void rainChar.offsetWidth;
  rainChar.classList.add('rain-exit');
  setTimeout(() => rainChar.classList.remove('rain-exit'), 900);
}

rainBtn.addEventListener('click', () => {
  raining ? stopRain() : startRain();
});

// ===== 星空 =====
const starsBtn = document.getElementById('stars-btn');
const bg = document.getElementById('bg');
let starsActive = false;

let shootingStarTimer = null;
let shootingStarLoop = null;

function launchShootingStar() {
  const star = document.createElement('div');
  star.className = 'shooting-star';

  // 左上エリアからランダムに出発
  const startX = Math.random() * window.innerWidth * 0.5;
  const startY = Math.random() * window.innerHeight * 0.3;

  // 右下方向へ（60〜75度）
  const angle = (60 + Math.random() * 15) * Math.PI / 180;
  const dist = 300 + Math.random() * 300;
  const endX = startX + Math.cos(angle) * dist;
  const endY = startY + Math.sin(angle) * dist;
  const dur = 600 + Math.random() * 400;

  // 尾の向きを進行方向に合わせる
  const deg = (angle * 180 / Math.PI);
  star.style.cssText = `left:${startX}px; top:${startY}px; transform:rotate(${deg}deg);`;
  document.body.appendChild(star);

  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 2);
    star.style.left = (startX + (endX - startX) * ease) + 'px';
    star.style.top  = (startY + (endY - startY) * ease) + 'px';
    star.style.opacity = t < 0.8 ? '1' : (1 - (t - 0.8) / 0.2);
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      star.remove();
    }
  }
  requestAnimationFrame(tick);
}

function scheduleShootingStars() {
  if (!starsActive) return;
  launchShootingStar();
  // 複数同時に出ることもある
  if (Math.random() < 0.3) setTimeout(launchShootingStar, 150 + Math.random() * 200);
  shootingStarLoop = setTimeout(scheduleShootingStars, 1800 + Math.random() * 2500);
}

function startStars() {
  starsActive = true;
  starsBtn.textContent = '星空 ✨ ON';
  bg.style.transition = 'background-image 0s, filter 1.5s, opacity 1.5s';
  bg.style.backgroundImage = "url('Gemini_Generated_Image_17l43e17l43e17l4.png')";
  bg.style.filter = 'saturate(1.1) brightness(0.85) blur(0px)';
  bg.style.opacity = '1';
  // オーバーレイを暗く
  bg.style.setProperty('--overlay', 'rgba(10,10,30,0.35)');
  bg.dataset.stars = '1';
  // 背景切り替えから2秒後に流れ星スタート
  shootingStarTimer = setTimeout(scheduleShootingStars, 2000);
}

function stopStars() {
  starsActive = false;
  starsBtn.textContent = '星空 ✨';
  bg.style.transition = 'filter 1.5s, opacity 1.5s';
  bg.style.backgroundImage = "url('background.png')";
  bg.style.filter = 'saturate(0.96) brightness(1.10) blur(2.5px)';
  bg.style.transform = 'scale(1.05)';
  delete bg.dataset.stars;
  clearTimeout(shootingStarTimer);
  clearTimeout(shootingStarLoop);
  shootingStarTimer = null;
  shootingStarLoop = null;
}

starsBtn.addEventListener('click', () => {
  starsActive ? stopStars() : startStars();
});

const jumpBtn = document.getElementById('jump-btn');
jumpBtn.addEventListener('click', () => {
  // ボタン自身のぷにゅ
  jumpBtn.classList.remove('punyu');

  jumpBtn.classList.add('punyu');

  // 全キャラぽよよん（少しずつ時間をずらして波のように）

      it.flip.classList.remove('char-punyu');
      void it.flip.offsetWidth;
      it.flip.classList.add('char-punyu');
    }, i * 80);
  });
});
jumpBtn.addEventListener('animationend', () => {
  jumpBtn.classList.remove('punyu');
});
</script>
</body>
</html>
